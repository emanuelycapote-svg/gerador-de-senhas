<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreamcore Password Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dream-bg"></div>

    <div id="welcome-screen" class="container">
        <h1 class="pixel-title">SUA SENHA PERFEITA</h1>
        <p class="subtitle">Você já esteve aqui antes?...</p>
        <button id="btn-enter" class="pixel-btn">ENTRAR</button>
    </div>

    <div id="generator-screen" class="container hidden">
        <h2 class="section-title">GERADOR</h2>

        <div class="password-display-container">
            <input type="text" id="password-output" class="pixel-input" placeholder="Sua senha surgirá aqui..." autocomplete="off">
        </div>

        <div class="strength-wrapper">
            <span class="label">Segurança:</span>
            <div class="strength-meter-bg">
                <div id="strength-pointer"></div>
            </div>
        </div>

        <div class="control-group">
            <label for="char-count">Caracteres: <span id="char-val">12</span></label>
            <input type="range" id="char-count" min="6" max="32" value="12" class="pixel-slider">
        </div>

        <div class="checklist shadow-box">
            <label class="check-item">
                <input type="checkbox" id="chk-upper" checked>
                <span class="custom-box"></span> Letras Maiúsculas
            </label>
            <label class="check-item">
                <input type="checkbox" id="chk-lower" checked>
                <span class="custom-box"></span> Letras Minúsculas
            </label>
            <label class="check-item">
                <input type="checkbox" id="chk-numbers" checked>
                <span class="custom-box"></span> Números
            </label>
            <label class="check-item">
                <input type="checkbox" id="chk-symbols">
                <span class="custom-box"></span> Caracteres Especiais
            </label>
        </div>

        <button id="btn-generate" class="pixel-btn trigger-btn">GERE A SENHA</button>
    </div>

    <footer class="dream-footer">
        <p>© 2004 - Memories OS</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
